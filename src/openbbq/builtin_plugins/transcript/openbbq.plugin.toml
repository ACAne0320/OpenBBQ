name = "transcript"
version = "0.1.0"
runtime = "python"
entrypoint = "plugin:run"

[[tools]]
name = "correct"
description = "Correct source-language ASR transcript segments with an OpenAI-compatible model."
input_artifact_types = ["asr_transcript"]
output_artifact_types = ["asr_transcript"]
effects = ["network"]

[tools.parameter_schema]
type = "object"
additionalProperties = false
required = ["model", "source_lang"]

[tools.parameter_schema.properties.model]
type = "string"

[tools.parameter_schema.properties.source_lang]
type = "string"

[tools.parameter_schema.properties.temperature]
type = "number"
default = 0

[tools.parameter_schema.properties.system_prompt]
type = "string"

[tools.parameter_schema.properties.base_url]
type = "string"

[tools.parameter_schema.properties.domain_context]
type = "string"

[tools.parameter_schema.properties.max_segments_per_request]
type = "integer"
minimum = 1
default = 20

[tools.parameter_schema.properties.uncertainty_threshold]
type = "number"

[tools.parameter_schema.properties.glossary_rules]
type = "array"
default = []

[tools.parameter_schema.properties.glossary_rules.items]
type = "object"
additionalProperties = false

[tools.parameter_schema.properties.glossary_rules.items.properties.source]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.target]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.find]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.replace]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.aliases]
type = "array"
items = { type = "string" }

[tools.parameter_schema.properties.glossary_rules.items.properties.protected]
type = "boolean"
default = false

[[tools]]
name = "segment"
description = "Derive subtitle-ready timed segments from an ASR transcript."
input_artifact_types = ["asr_transcript"]
output_artifact_types = ["subtitle_segments"]
effects = []

[tools.parameter_schema]
type = "object"
additionalProperties = false

[tools.parameter_schema.properties.max_duration_seconds]
type = "number"
exclusiveMinimum = 0
default = 6

[tools.parameter_schema.properties.min_duration_seconds]
type = "number"
minimum = 0
default = 0.8

[tools.parameter_schema.properties.max_lines]
type = "integer"
minimum = 1
default = 2

[tools.parameter_schema.properties.max_chars_per_line]
type = "integer"
minimum = 1
default = 40

[tools.parameter_schema.properties.max_chars_per_second]
type = "number"
exclusiveMinimum = 0
default = 20

[tools.parameter_schema.properties.pause_threshold_ms]
type = "integer"
minimum = 0
default = 500

[tools.parameter_schema.properties.prefer_sentence_boundaries]
type = "boolean"
default = true
