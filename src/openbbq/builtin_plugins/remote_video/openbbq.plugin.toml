name = "remote_video"
version = "0.1.0"
runtime = "python"
entrypoint = "plugin:run"

[[tools]]
name = "download"
description = "Download a remote video URL to a file-backed mp4 video artifact."
input_artifact_types = []
output_artifact_types = ["video"]
effects = ["network", "writes_files"]

[tools.parameter_schema]
type = "object"
additionalProperties = false
required = ["url"]

[tools.parameter_schema.properties.url]
type = "string"

[tools.parameter_schema.properties.format]
type = "string"
enum = ["mp4"]
default = "mp4"

[tools.parameter_schema.properties.quality]
type = "string"
default = "best"

[tools.parameter_schema.properties.auth]
type = "string"
enum = ["auto", "anonymous", "browser_cookies"]
default = "auto"

[tools.parameter_schema.properties.browser]
type = "string"

[tools.parameter_schema.properties.browser_profile]
type = "string"
