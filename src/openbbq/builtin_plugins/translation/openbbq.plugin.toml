name = "translation"
version = "0.1.0"
runtime = "python"
entrypoint = "plugin:run"
manifest_version = 2

[[tools]]
name = "translate"
description = "Translate subtitle-ready segments with an OpenAI-compatible chat completions API."
input_artifact_types = ["subtitle_segments"]
output_artifact_types = ["translation"]
effects = ["network"]

[tools.parameter_schema]
type = "object"
additionalProperties = false
required = ["source_lang", "target_lang"]

[tools.parameter_schema.properties.provider]
type = "string"
default = "openai_compatible"

[tools.parameter_schema.properties.source_lang]
type = "string"

[tools.parameter_schema.properties.target_lang]
type = "string"

[tools.parameter_schema.properties.model]
type = "string"

[tools.parameter_schema.properties.temperature]
type = "number"
default = 0

[tools.parameter_schema.properties.system_prompt]
type = "string"

[tools.parameter_schema.properties.base_url]
type = "string"

[tools.parameter_schema.properties.glossary_rules]
type = "array"
default = []

[tools.parameter_schema.properties.glossary_rules.items]
type = "object"
additionalProperties = false

[tools.parameter_schema.properties.glossary_rules.items.properties.source]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.target]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.find]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.replace]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.aliases]
type = "array"
items = { type = "string" }

[tools.parameter_schema.properties.glossary_rules.items.properties.protected]
type = "boolean"
default = false

[tools.parameter_schema.properties.glossary_rules.items.properties.case_sensitive]
type = "boolean"
default = false

[tools.parameter_schema.properties.glossary_rules.items.properties.is_regex]
type = "boolean"
default = false

[tools.inputs.subtitle_segments]
artifact_types = ["subtitle_segments"]
required = true
description = "Subtitle-ready timed segments to translate."

[tools.outputs.translation]
artifact_type = "translation"
description = "Translated segments."

[[tools]]
name = "qa"
description = "Check translated segments for terminology misses, numeric drift, and subtitle readability risks."
input_artifact_types = ["translation"]
output_artifact_types = ["translation_qa"]
effects = []

[tools.parameter_schema]
type = "object"
additionalProperties = false

[tools.parameter_schema.properties.max_lines]
type = "integer"
minimum = 1
default = 2

[tools.parameter_schema.properties.max_chars_per_line]
type = "integer"
minimum = 1
default = 42

[tools.parameter_schema.properties.max_chars_per_second]
type = "number"
exclusiveMinimum = 0
default = 20

[tools.parameter_schema.properties.glossary_rules]
type = "array"
default = []

[tools.parameter_schema.properties.glossary_rules.items]
type = "object"
additionalProperties = false

[tools.parameter_schema.properties.glossary_rules.items.properties.source]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.target]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.find]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.replace]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.aliases]
type = "array"
items = { type = "string" }

[tools.parameter_schema.properties.glossary_rules.items.properties.protected]
type = "boolean"
default = false

[tools.parameter_schema.properties.glossary_rules.items.properties.case_sensitive]
type = "boolean"
default = false

[tools.parameter_schema.properties.glossary_rules.items.properties.is_regex]
type = "boolean"
default = false

[tools.inputs.translation]
artifact_types = ["translation"]
required = true
description = "Translated segments to check."

[tools.outputs.qa]
artifact_type = "translation_qa"
description = "Translation QA report."
