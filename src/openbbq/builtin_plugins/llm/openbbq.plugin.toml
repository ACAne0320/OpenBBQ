name = "llm"
version = "0.1.0"
runtime = "python"
entrypoint = "plugin:run"

[[tools]]
name = "translate"
description = "Translate transcript segments with an OpenAI-compatible chat completions API."
input_artifact_types = ["asr_transcript", "subtitle_segments"]
output_artifact_types = ["translation"]
effects = ["network"]

[tools.parameter_schema]
type = "object"
additionalProperties = false
required = ["source_lang", "target_lang", "model"]

[tools.parameter_schema.properties.source_lang]
type = "string"

[tools.parameter_schema.properties.target_lang]
type = "string"

[tools.parameter_schema.properties.model]
type = "string"

[tools.parameter_schema.properties.temperature]
type = "number"
default = 0

[tools.parameter_schema.properties.system_prompt]
type = "string"

[tools.parameter_schema.properties.base_url]
type = "string"

[tools.parameter_schema.properties.glossary_rules]
type = "array"
default = []

[tools.parameter_schema.properties.glossary_rules.items]
type = "object"
additionalProperties = false

[tools.parameter_schema.properties.glossary_rules.items.properties.source]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.target]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.find]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.replace]
type = "string"

[tools.parameter_schema.properties.glossary_rules.items.properties.aliases]
type = "array"
items = { type = "string" }

[tools.parameter_schema.properties.glossary_rules.items.properties.protected]
type = "boolean"
default = false

[tools.parameter_schema.properties.glossary_rules.items.properties.case_sensitive]
type = "boolean"
default = false

[tools.parameter_schema.properties.glossary_rules.items.properties.is_regex]
type = "boolean"
default = false
