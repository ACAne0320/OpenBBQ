name = "glossary"
version = "0.1.0"
runtime = "python"
entrypoint = "plugin:run"
manifest_version = 2

[[tools]]
name = "replace"
description = "Apply deterministic glossary replacements to transcript segments."
effects = []

[tools.parameter_schema]
type = "object"
additionalProperties = false

[tools.parameter_schema.properties.rules]
type = "array"
default = []

[tools.parameter_schema.properties.rules.items]
type = "object"
additionalProperties = false

[tools.parameter_schema.properties.rules.items.properties.source]
type = "string"

[tools.parameter_schema.properties.rules.items.properties.target]
type = "string"

[tools.parameter_schema.properties.rules.items.properties.find]
type = "string"

[tools.parameter_schema.properties.rules.items.properties.replace]
type = "string"

[tools.parameter_schema.properties.rules.items.properties.is_regex]
type = "boolean"
default = false

[tools.parameter_schema.properties.rules.items.properties.case_sensitive]
type = "boolean"
default = false

[tools.parameter_schema.properties.rules.items.properties.aliases]
type = "array"
items = { type = "string" }

[tools.parameter_schema.properties.rules.items.properties.protected]
type = "boolean"
default = false

[tools.inputs.transcript]
artifact_types = ["asr_transcript"]
required = true
description = "Transcript segments to rewrite."

[tools.outputs.transcript]
artifact_type = "asr_transcript"
description = "Rewritten transcript segments."
